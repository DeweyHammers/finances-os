appId: com.richarddeweyhammers.finances-os
productName: Finances OS
copyright: Copyright © 2026 Richard Dewey Hammers
directories:
  output: dist
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - app
      - prisma/dev.db
publish: null
win:
  icon: resources/icon.ico
  target:
    - target: nsis
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Finances OS
  createDesktopShortcut: true
  createStartMenuShortcut: true

